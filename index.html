<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .timer-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== TOP BUTTONS ===== */
    .top-buttons {
      display: flex;
      justify-content: space-between;
      width: 180px;
      margin-bottom: -3px;
      z-index: 20;
    }
    .top-btn {
      width: 30px;
      height: 14px;
      border: none;
      cursor: pointer;
      border-radius: 4px 4px 2px 2px;
      transition: all 0.15s ease;
      background: linear-gradient(0deg, #E03E3E, #c43535);
      box-shadow: 0 -2px 5px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .top-btn:hover {
      background: linear-gradient(0deg, #e94a4a, #c43535);
    }
    .top-btn:active {
      height: 9px;
      margin-top: 5px;
    }
    .top-btn.pressed {
      height: 7px;
      margin-top: 7px;
      background: linear-gradient(0deg, #c43535, #a82c2c);
      box-shadow: 0 -1px 2px rgba(0,0,0,0.15);
    }
    .top-btn.alarm-off {
      background: linear-gradient(0deg, #bbb, #a0a0a0);
      box-shadow: 0 -2px 5px rgba(0,0,0,0.08);
    }

    /* ===== HOUSING ===== */
    .housing {
      width: 320px;
      height: 320px;
      border-radius: 22px;
      position: relative;
      background: #ffffff;
      box-shadow:
        0 2px 12px rgba(0,0,0,0.08),
        0 0 0 1px rgba(0,0,0,0.04);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ===== CLOCK FACE (transparent, just container) ===== */
    .face {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      position: relative;
      z-index: 2;
      cursor: pointer;
      background: transparent;
    }

    .face-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Tick styles */
    .tk { stroke-linecap: butt; }
    .tk-maj { stroke: #444; stroke-width: 2.2; }
    .tk-min { stroke: #c8c8c8; stroke-width: 0.8; }

    /* Red pie wedge */
    .pie { fill: #E03E3E; }

    /* Number labels */
    .num-label {
      font-family: 'Inter', sans-serif;
      font-size: 12.5px;
      font-weight: 700;
      fill: #666;
      text-anchor: middle;
      dominant-baseline: central;
      user-select: none;
      cursor: pointer;
    }
    .num-label:hover { fill: #E03E3E; }
    .num-label.active { fill: #E03E3E; font-weight: 800; }


    /* Countdown */
    .countdown {
      position: absolute;
      top: 14px;
      right: 16px;
      font-family: 'Inter', monospace;
      font-size: 10px;
      font-weight: 700;
      color: rgba(0,0,0,0.18);
      letter-spacing: 0.5px;
      z-index: 10;
    }



  </style>
</head>
<body>
  <div class="timer-wrapper">
    <div class="top-buttons">
      <button class="top-btn" id="btnAlarm" title="알람 on/off"></button>
      <button class="top-btn" id="topBtn" title="시작 / 일시정지"></button>
    </div>
    <div class="housing">
      <div class="countdown" id="countdown">25:00</div>
      <div class="face" id="face">
        <svg class="face-svg" viewBox="0 0 280 280" id="fsvg"></svg>
      </div>
    </div>
  </div>

  <script>
    const CX = 140, CY = 140, R = 125, ns = 'http://www.w3.org/2000/svg';
    const svg = document.getElementById('fsvg');
    let pieEl;

    (function () {
      pieEl = document.createElementNS(ns, 'path');
      pieEl.setAttribute('class', 'pie');
      svg.appendChild(pieEl);

      for (let i = 0; i < 60; i++) {
        const ang = (i * 6 - 90) * Math.PI / 180;
        const maj = i % 5 === 0;
        const outerR = R;
        const innerR = maj ? R - 13 : R - 6;
        const l = document.createElementNS(ns, 'line');
        l.setAttribute('x1', CX + innerR * Math.cos(ang));
        l.setAttribute('y1', CY + innerR * Math.sin(ang));
        l.setAttribute('x2', CX + outerR * Math.cos(ang));
        l.setAttribute('y2', CY + outerR * Math.sin(ang));
        l.setAttribute('class', 'tk ' + (maj ? 'tk-maj' : 'tk-min'));
        svg.appendChild(l);
      }

      const numR = R - 26;
      for (let i = 0; i < 60; i += 5) {
        const ang = (i * 6 - 90) * Math.PI / 180;
        const x = CX + numR * Math.cos(ang);
        const y = CY + numR * Math.sin(ang);
        const txt = document.createElementNS(ns, 'text');
        txt.setAttribute('x', x);
        txt.setAttribute('y', y);
        txt.setAttribute('class', 'num-label');
        txt.textContent = i === 0 ? '60' : i;
        txt.dataset.min = i === 0 ? 60 : i;
        txt.addEventListener('click', function (e) {
          e.stopPropagation();
          if (run) return;
          setT(+this.dataset.min);
        });
        svg.appendChild(txt);
      }
    })();

    function piePath(minutes) {
      if (minutes <= 0) return '';
      const pr = R - 2;
      const frac = minutes / 60;
      if (frac >= 1) return `M${CX} ${CY - pr}A${pr} ${pr} 0 1 1 ${CX - 0.01} ${CY - pr}L${CX} ${CY}Z`;
      const endAngle = (-90 + frac * 360) * Math.PI / 180;
      return `M${CX} ${CY}L${CX} ${CY - pr}A${pr} ${pr} 0 ${frac > 0.5 ? 1 : 0} 1 ${CX + pr * Math.cos(endAngle)} ${CY + pr * Math.sin(endAngle)}Z`;
    }

    let total = 25 * 60, remain = total, run = false, iv = null, snd = true;
    const $ = s => document.querySelector(s);
    const $$ = s => document.querySelectorAll(s);

    function render() {
      const m = Math.floor(remain / 60), s = remain % 60;
      $('#countdown').textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      pieEl.setAttribute('d', piePath(remain / 60));
      $$('.num-label').forEach(el => {
        el.classList.toggle('active', +el.dataset.min === total / 60);
      });
    }

    function setT(min) {
      if (run) return;
      min = Math.round(min / 5) * 5;
      min = Math.max(5, Math.min(60, min));
      total = min * 60; remain = total;
      render();
    }

    function go() {
      if (remain <= 0) return;
      run = true;
      $('#topBtn').classList.add('pressed');
      iv = setInterval(() => {
        remain--; render();
        if (remain <= 0) { halt(); ding(); }
      }, 1000);
    }

    function pause() {
      run = false; clearInterval(iv);
      $('#topBtn').classList.remove('pressed');
    }

    function halt() { pause(); }

    function rst() { halt(); remain = total; render(); }

    function ding() {
      if (!snd) return;
      try {
        const c = new AudioContext();
        [523, 659, 784, 1047].forEach((f, i) => {
          const o = c.createOscillator(), g = c.createGain();
          o.connect(g); g.connect(c.destination);
          o.frequency.value = f; o.type = 'sine';
          g.gain.setValueAtTime(0.12, c.currentTime + i * 0.18);
          g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i * 0.18 + 0.25);
          o.start(c.currentTime + i * 0.18); o.stop(c.currentTime + i * 0.18 + 0.25);
        });
      } catch (e) {}
    }

    // Drag on face to set time
    let dragging = false;

    function getAngleFromEvent(e) {
      const face = $('#face');
      const rect = face.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      let angle = Math.atan2(clientY - cy, clientX - cx) * 180 / Math.PI + 90;
      if (angle < 0) angle += 360;
      return angle;
    }

    function setTimeFromAngle(angle) {
      let minutes = Math.round(angle / 6);
      if (minutes === 0) minutes = 60;
      minutes = Math.round(minutes / 5) * 5;
      if (minutes === 0) minutes = 5;
      setT(minutes);
    }

    $('#face').addEventListener('mousedown', (e) => {
      if (run) return;
      if (e.target.classList.contains('num-label')) return;
      dragging = true;
      setTimeFromAngle(getAngleFromEvent(e));
      e.preventDefault();
    });

    $('#face').addEventListener('touchstart', (e) => {
      if (run) return;
      dragging = true;
      setTimeFromAngle(getAngleFromEvent(e));
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      setTimeFromAngle(getAngleFromEvent(e));
    });

    document.addEventListener('touchmove', (e) => {
      if (!dragging) return;
      setTimeFromAngle(getAngleFromEvent(e));
    }, { passive: false });

    document.addEventListener('mouseup', () => { dragging = false; });
    document.addEventListener('touchend', () => { dragging = false; });

    // Top button: start/pause (short press), reset (long press)
    let pressTimer = null;
    let didLongPress = false;

    $('#topBtn').addEventListener('mousedown', () => {
      didLongPress = false;
      pressTimer = setTimeout(() => {
        didLongPress = true;
        rst();
      }, 600);
    });

    $('#topBtn').addEventListener('mouseup', () => {
      clearTimeout(pressTimer);
      if (!didLongPress) {
        if (run) pause(); else go();
      }
    });

    $('#topBtn').addEventListener('mouseleave', () => {
      clearTimeout(pressTimer);
    });

    // Alarm on/off
    $('#btnAlarm').addEventListener('click', () => {
      snd = !snd;
      $('#btnAlarm').classList.toggle('alarm-off', !snd);
    });

    render();
  </script>
</body>
</html>
